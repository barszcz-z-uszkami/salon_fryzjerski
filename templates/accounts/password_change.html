{% extends "base.html" %}

{% block title %}Studio Fryzjerskie | Zmiana hasła{% endblock %}

{% block content %}
<section class="auth-wrapper">
    <div class="card">
        <h1>Zmień hasło</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Zapisz nowe hasło</button>
        </form>
        <p class="form-link"><a href="{% url 'dashboard' %}">Powrót do konta</a></p>
    </div>
</section>
{% endblock %}
